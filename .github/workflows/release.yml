name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: 386
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o fauxfile${{ matrix.goos == 'windows' && '.exe' || '' }} ./cmd/fauxfile

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: fauxfile-${{ matrix.goos }}-${{ matrix.goarch }}
          path: fauxfile${{ matrix.goos == 'windows' && '.exe' || '' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: prepare release assets
        run: |
          mkdir -p release
          for d in artifacts/fauxfile-*; do
            name=$(basename "$d")
            os=$(echo "$name" | cut -d- -f2)
            arch=$(echo "$name" | cut -d- -f3)
            bin="$d/fauxfile"
            [ -f "$d/fauxfile.exe" ] && bin="$d/fauxfile.exe"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            cp "$bin" "release/fauxfile-${os}-${arch}${ext}"
          done
          ls -la release/

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
