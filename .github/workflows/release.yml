name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binaries
        run: |
          export CGO_ENABLED=0
          VERSION=${GITHUB_REF#refs/tags/}
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o fauxfile-linux-amd64 ./cmd/fauxfile
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o fauxfile-linux-arm64 ./cmd/fauxfile
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o fauxfile-darwin-amd64 ./cmd/fauxfile
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o fauxfile-darwin-arm64 ./cmd/fauxfile
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o fauxfile-windows-amd64.exe ./cmd/fauxfile
          GOOS=windows GOARCH=386 go build -ldflags "-s -w -X main.Version=${VERSION}" -o fauxfile-windows-386.exe ./cmd/fauxfile
          mkdir -p dist
          mv fauxfile-* dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fauxfile-linux-amd64
            dist/fauxfile-linux-arm64
            dist/fauxfile-darwin-amd64
            dist/fauxfile-darwin-arm64
            dist/fauxfile-windows-amd64.exe
            dist/fauxfile-windows-386.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
